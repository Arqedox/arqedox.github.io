<style>

:root{
--bg1:#140909;
--bg2:#2b0f0f;
--accent:#ff2d55;
--muted:rgba(255,255,255,0.92);
--card-bg: rgba(0,0,0,0.55);
--box-bg: rgba(18,6,6,0.6);
}

*{box-sizing:border-box}

html,body{
height:100%;
margin:0;
padding:0;
overflow-x:hidden;
font-family:Inter,system-ui,Roboto,sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--muted);
scroll-behavior:smooth
}

a{color:inherit;text-decoration:none}

.container{
max-width:1100px;
margin:0 auto;
padding:16px
}

header{
position:sticky;
top:0;
z-index:100;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(6px);
border-bottom:1px solid rgba(255,255,255,0.03)
}

.topbar{
display:flex;
align-items:center;
gap:12px;
padding:12px 16px
}

#site-logo{
height:52px;
border-radius:8px
}

.brand-title{
font-family:'Press Start 2P',cursive;
color:var(--accent);
font-size:18px
}

.hamburger{
margin-left:auto;
cursor:pointer;
padding:8px;
display:flex;
flex-direction:column;
gap:6px;
width:44px;
height:36px;
justify-content:center;
align-items:center
}

.hamburger .bar{
display:block;
width:28px;
height:3px;
background:var(--accent);
border-radius:3px
}

.side-panel-backdrop{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
opacity:0;
visibility:hidden;
transition:opacity .25s ease;
z-index:90
}

.side-panel{
position:fixed;
right:-100%;
top:0;
height:100vh;
width:60vw;
max-width:420px;
background:linear-gradient(180deg, rgba(30,8,8,0.98), rgba(10,6,6,0.98));
box-shadow:-20px 0 50px rgba(0,0,0,0.7);
z-index:95;
padding:20px;
transition:right .28s ease;
display:flex;
flex-direction:column
}

.side-panel.open{right:0}
.side-panel-backdrop.open{opacity:1;visibility:visible}

.side-links{
margin-top:28px;
display:flex;
flex-direction:column;
gap:12px
}

.side-links a{
display:block;
padding:12px;
border-radius:12px;
text-decoration:none;
color:var(--accent);
background:linear-gradient(180deg, rgba(0,0,0,0.12), transparent);
border:1px solid rgba(255,45,85,0.06);
font-weight:700
}

.hero{
padding:36px 16px;
background:linear-gradient(180deg,rgba(0,0,0,0.12),transparent)
}

.hero-inner{
display:flex;
gap:20px;
align-items:center;
flex-wrap:wrap
}

.hero h1{
font-family:'Press Start 2P',cursive;
color:var(--accent);
font-size:28px
}

.btn{
display:inline-block;
padding:12px 18px;
border-radius:14px;
font-weight:700
}

.btn-accent{
background:var(--accent);
color:#000
}

.ad-banner{
display:flex;
justify-content:center;
margin:20px 0
}

section{padding:26px 16px}

h2.section-title{
color:var(--accent);
text-align:center;
margin:6px 0 18px;
font-size:20px
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:14px
}

.video-box{
background:var(--box-bg);
border-radius:14px;
padding:12px;
box-shadow:0 12px 40px rgba(0,0,0,0.6)
}

.video-embed{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden
}

.video-embed iframe{
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
border:0
}

.community-row{
display:flex;
gap:16px;
flex-wrap:wrap;
justify-content:center
}

.community-row a{
padding:12px 16px;
border-radius:12px;
font-weight:700;
background:var(--accent);
color:#000
}

</style>
</head>
