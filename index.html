<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ARQEDOX</title>
  <meta name="description" content="ARQEDOX - Game downloads, tutorials, community and YouTube videos." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#140909; --bg2:#2b0f0f; --accent:#ff2d55; --muted:rgba(255,255,255,0.92);
      --card-bg: rgba(0,0,0,0.55); --box-bg: rgba(18,6,6,0.6);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;padding:0;overflow-x:hidden;font-family:Inter,system-ui,Roboto,sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--muted);scroll-behavior:smooth}
    a{color:inherit;text-decoration:none}
    .container{max-width:1100px;margin:0 auto;padding:16px}

    header{position:sticky;top:0;z-index:100;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,0.03)}
    .topbar{display:flex;align-items:center;gap:12px;padding:12px 16px}
    #site-logo{height:52px;border-radius:8px}
    .brand-title{font-family:'Press Start 2P',cursive;color:var(--accent);font-size:18px}

    .hamburger{margin-left:auto;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:6px;width:44px;height:36px;justify-content:center;align-items:center}
    .hamburger .bar{display:block;width:28px;height:3px;background:var(--accent);border-radius:3px;transition:transform .25s ease,opacity .25s ease}
    .hamburger.open .bar1{transform:translateY(6px) rotate(45deg)}
    .hamburger.open .bar2{opacity:0}
    .hamburger.open .bar3{transform:translateY(-6px) rotate(-45deg)}

    .side-panel-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);opacity:0;visibility:hidden;transition:opacity .25s ease;z-index:90}
    .side-panel{position:fixed;right:-100%;top:0;height:100vh;width:60vw;max-width:420px;background:linear-gradient(180deg, rgba(30,8,8,0.98), rgba(10,6,6,0.98));box-shadow:-20px 0 50px rgba(0,0,0,0.7);z-index:95;padding:20px;transition:right .28s ease;display:flex;flex-direction:column}
    @media (max-width:720px){ .side-panel{width:75vw} .brand-title{font-size:14px} #site-logo{height:46px} }
    .side-panel.open{right:0}
    .side-panel-backdrop.open{opacity:1;visibility:visible}

    .side-header{display:flex;align-items:center;gap:12px;justify-content:space-between}
    .side-title{font-family:'Press Start 2P';color:var(--accent);font-size:16px}
    .close-btn{background:transparent;border:0;color:var(--accent);font-weight:700;cursor:pointer;font-size:18px}

    .side-links{margin-top:28px;display:flex;flex-direction:column;gap:12px}
    .side-links a{display:block;padding:12px;border-radius:12px;text-decoration:none;color:var(--accent);background:linear-gradient(180deg, rgba(0,0,0,0.12), transparent);border:1px solid rgba(255,45,85,0.06);font-weight:700}
    .side-links a:hover{box-shadow:0 8px 30px rgba(255,45,85,0.08);transform:translateX(-6px)}

    .hero{padding:36px 16px;background:linear-gradient(180deg,rgba(0,0,0,0.12),transparent)}
    .hero-inner{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
    .hero-left{flex:1;min-width:260px}
    .hero h1{font-family:'Press Start 2P',cursive;color:var(--accent);font-size:28px;margin:0 0 10px}
    .hero p{margin:0 0 16px;color:rgba(255,255,255,0.85);max-width:720px;line-height:1.5}

    .btn{display:inline-block;padding:12px 18px;border-radius:14px;font-weight:700;cursor:pointer;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
    .btn-accent{background:var(--accent);color:#000}

    section{padding:26px 16px}
    h2.section-title{color:var(--accent);text-align:center;margin:6px 0 18px;font-size:20px}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}

    .video-box{background:rgba(18,6,6,0.6);border-radius:14px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,0.6);border:1px solid rgba(255,45,85,0.06);display:flex;flex-direction:column;gap:12px}

    .video-embed{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:10px;background:#000}
    .video-embed iframe{position:absolute;left:0;top:0;width:100%;height:100%;border:0}

    .video-title{font-weight:700;color:var(--accent);font-size:16px}
    .video-channel{font-size:13px;color:rgba(255,255,255,0.8)}

    .community-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:12px}
    .community-row a{padding:12px 16px;border-radius:12px;font-weight:700;background:var(--accent);color:#000}

    .fade-in{opacity:0;transform:translateY(18px);animation:fadeUp .7s ease forwards}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<header>
<div class="container topbar">
<img id="site-logo" src="logo.png" alt="ARQEDOX Logo">
<div class="brand-title">ARQEDOX</div>

<div class="hamburger" id="hamburger">
<span class="bar bar1"></span>
<span class="bar bar2"></span>
<span class="bar bar3"></span>
</div>
</div>
</header>

<div id="side-backdrop" class="side-panel-backdrop"></div>

<aside id="side-panel" class="side-panel">
<div class="side-header">
<div>
<div class="side-title">ARQEDOX</div>
<div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:6px">Games Link</div>
</div>
<button class="close-btn" id="side-close">Close ×</button>
</div>

<nav class="side-links">
<a href="games.html">▶ Games Link</a>
</nav>
</aside>

<main>

<section class="hero fade-in">
<div class="container hero-inner">

<div class="hero-left">
<h1>ARQEDOX</h1>
<p>Welcome — your hub for game downloads, mod tutorials and epic gameplay.</p>
<a class="btn btn-accent" href="games.html">Explore Games</a>
</div>

<div style="min-width:200px;max-width:320px">
<img src="https://via.placeholder.com/320x200.png?text=ARQEDOX"
style="border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,0.6)">
</div>

</div>
</section>

</main>

<footer style="padding:18px;background:rgba(0,0,0,0.45);margin-top:20px;text-align:center">
&copy; <span id="year"></span> ARQEDOX
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const hamburger = document.getElementById('hamburger');
const side = document.getElementById('side-panel');
const backdrop = document.getElementById('side-backdrop');
const closeBtn = document.getElementById('side-close');

function openSide(){
side.classList.add('open');
backdrop.classList.add('open');
document.body.style.overflow='hidden';
}

function closeSide(){
side.classList.remove('open');
backdrop.classList.remove('open');
document.body.style.overflow='';
}

hamburger.onclick = ()=> side.classList.contains('open') ? closeSide() : openSide();
backdrop.onclick = closeSide;
closeBtn.onclick = closeSide;
</script>

</body>
  </html>
